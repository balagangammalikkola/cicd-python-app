name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4


      -  name: setup python
         uses: actions/setup-python@v4
         with:
          python-version: '3.10'

      - name: Run Python app
        run: python app.py
